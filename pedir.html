<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pedir</title>
    <style>
        body {
            background-color: rgb(0, 4, 20);
        }
        .pedir {
            color: rgb(255, 255, 255);
            font: normal 40pt arial black;
            position: absolute;
            top: 31%;
            left: 21%;
            animation: pedir 2.0s ease forwards;
            opacity: 0;
            z-index: 1;
        }
        @keyframes pedir {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        #destino {
            background-color: gold;
            width: 200px;
            border-radius: 20px;
            transition: 0.5s;
            height: 40px;
            position: absolute;
            top: 50%;
            left: 30%;
            z-index: 1;
        }
        #destino:hover {
            transform: scale(1.1);
            input::placeholder{
                color: black;
                font-style: italic;
            }
        }
        #nome {
            position: absolute;
            top: 60%;
            left: 30%;
            background-color: gold;
            width: 200px;
            border-radius: 20px;
            height: 40px;
            border-color: 10px solid black;
            transition: 0.5s;
        }
        #nome:hover {
            transform: scale(1.1);
        }
        .volante {
            position: absolute;
            top: 6%;
            left: 32%;
            width: 200px;
            z-index: 0;
            animation: volante 2s ease forwards;
            transform: rotateZ(0deg);
        }
        @keyframes volante {
            0% {
                transform: rotateZ(160deg);
            }
            80% {
                transform: rotateZ(-20deg);
            }
            100% {
                transform: rotateZ(0deg);
            }
        }
        .p {
            position: absolute;
            top: 70%;
            left: 38%;
            width: 120px;
            height: 30px;
            background-color: rgba(51, 51, 51, 0.719);
            border-radius: 10px;
            transition: 0.5s;
        }
        .p:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <h1 class="pedir">SOLICITAR</h1>
    <input id="nome" placeholder="nome">
    <input id="destino" placeholder="destino">
    <button onclick="enviar()" class="p">Pedir</button>
    <img src="imagens/volante.png" class="volante">
    <script>
       function enviar(){

  let nome = document.getElementById("nome").value;
  let destino = document.getElementById("destino").value;

  if(nome === "" || destino === ""){
    alert("Preencha todos os campos!");
    return;
  }

  navigator.geolocation.getCurrentPosition(function(posicao){

    let lat = posicao.coords.latitude;
    let lon = posicao.coords.longitude;

    let mapa = "https://www.google.com/maps?q=" + lat + "," + lon;

    let numero = "5547920014905";

    let mensagem = "Nome: " + nome + 
                   "%0ADestino: " + destino +
                   "%0ALocalização: " + mapa;

    let url = "https://wa.me/" + numero + "?text=" + mensagem;

    window.open(url, "_blank");
  });
}
    </script>
</body>
</html>
